name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy key so config.py's default-secret guard passes; never used to sign anything real.
      AUTH_SECRET_KEY: ci-only-dummy-key-0123456789abcdefghijklmnopqrstuvwxyz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The test suite only touches pure-logic modules — skip the heavy ML stack
      # (torch/TotalSegmentator/pyradiomics) to keep CI fast.
      - run: pip install pytest httpx fastapi pydantic pydantic-settings sqlalchemy bcrypt pyjwt
      - run: python -m pytest tests -q
